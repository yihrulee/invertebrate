<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>進階挑戰｜從分類走向演化觀點</title>
  <style>
    :root {
      --bg: #f6fbf8;
      --card: #ffffff;
      --text: #203028;
      --muted: #66776e;
      --primary: #2f8f5b;
      --primary-dark: #1f6b42;
      --accent: #f2b84b;
      --blue: #3a7ca5;
      --purple: #7552a1;
      --line: #dce9e1;
      --shadow: 0 18px 44px rgba(31, 107, 66, 0.14);
      --disabled: #b9c5be;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans TC", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(47, 143, 91, 0.16), transparent 32%),
        radial-gradient(circle at bottom right, rgba(242, 184, 75, 0.22), transparent 30%),
        var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    header {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 52px 0 28px;
      text-align: center;
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 12px;
      padding: 7px 16px;
      border-radius: 999px;
      background: rgba(47, 143, 91, 0.13);
      color: var(--primary-dark);
      font-size: 0.92rem;
      font-weight: 800;
      letter-spacing: 0.08em;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.1rem, 5vw, 4.2rem);
      line-height: 1.12;
    }

    .subtitle {
      max-width: 760px;
      margin: 18px auto 0;
      color: var(--muted);
      font-size: 1.08rem;
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding-bottom: 72px;
    }

    .challenge-card {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: var(--shadow);
    }

    .challenge-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .challenge-card {
      min-height: 310px;
      padding: 30px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .challenge-card.hero {
      border-top: 8px solid var(--blue);
    }

    .challenge-card.master {
      border-top: 8px solid var(--purple);
    }

    .section-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      padding: 6px 12px;
      border-radius: 999px;
      background: #edf7f0;
      color: var(--primary-dark);
      font-weight: 800;
      font-size: 0.9rem;
    }

    h2 {
      margin: 0 0 12px;
      font-size: clamp(1.55rem, 3vw, 2.4rem);
      line-height: 1.25;
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    .challenge-icon {
      width: 72px;
      height: 72px;
      display: grid;
      place-items: center;
      margin-bottom: 18px;
      border-radius: 22px;
      font-size: 2.5rem;
    }

    .hero .challenge-icon {
      background: rgba(58, 124, 165, 0.12);
    }

    .master .challenge-icon {
      background: rgba(117, 82, 161, 0.12);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 48px;
      padding: 12px 20px;
      border: 0;
      border-radius: 999px;
      font: inherit;
      font-weight: 900;
      color: #fff;
      background: var(--primary);
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      width: fit-content;
      margin-top: 24px;
    }

    .btn:hover {
      transform: translateY(-2px);
      background: var(--primary-dark);
      box-shadow: 0 12px 24px rgba(47, 143, 91, 0.22);
    }

    @media (max-width: 860px) {
      header {
        padding-top: 36px;
      }

      .challenge-grid {
        grid-template-columns: 1fr;
      }

      .challenge-card {
        padding: 24px;
        border-radius: 24px;
      }
    }
  </style>
</head>
<body>
  <header>
    <span class="eyebrow">進階挑戰入口</span>
    <h1>進階挑戰賽</h1>
    <p class="subtitle">
      挑戰觀察、判斷、說明與高層次推理能力，完成所有任務即完成本次課程！
    </p>
  </header>

  <main>
    <section class="challenge-grid" aria-label="進階挑戰選單">
      <article class="challenge-card hero" id="heroCard">
        <div>
          <div class="challenge-icon">🏆</div>
          <span class="section-label">第一部分</span>
          <h2>英雄榜挑戰</h2>
          <p>
            挑戰學生的觀察、判斷與說明能力。完成任務後，可成為本單元的知識英雄。
          </p>
        </div>
        <a class="btn" href="hero.html">進入英雄榜挑戰 →</a>
      </article>

      <article class="challenge-card master" id="masterCard">
        <div>
          <div class="challenge-icon">🌟</div>
          <span class="section-label">第二部分</span>
          <h2>風雲榜挑戰</h2>
          <p>
            進一步整合演化觀點與分類證據，挑戰更高層次的推理與表達能力。
          </p>
        </div>
        <a class="btn" href="master.html">進入風雲榜挑戰 →</a>
      </article>
    </section>

    <p style="margin-top: 1.6em; text-align: center; font-size: 1.35rem; font-weight: 900; color: var(--primary-dark);">完成兩項挑戰任務，表示你已完成本次課程所有任務!</p>

    <p style="margin-top: 1em; text-align: center; font-size: 1.15rem; font-weight: 700; color: var(--muted);">
      當你完成了無脊椎動物的所有課程，表示你真的是<span style="color: #e05c2a;">太厲害了</span>!!<br>
      現在的你，可以嘗試<span style="color: var(--blue);">超前學習</span>，開始學習<span style="color: var(--purple);">脊索動物門</span>。
    </p>

    <div style="text-align: center; margin-top: 20px;">
      <a class="btn" href="vertebrate.html" style="font-size: 1.05rem; padding: 14px 28px;">
        🚀 超前學習，進入脊索動物門 →
      </a>
    </div>
  </main>
</body>
</html>
