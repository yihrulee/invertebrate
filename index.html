<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>無脊椎動物大冒險 - 學習入口</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: #020d1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* 浮動泡泡背景 */
    .bubble {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(94, 234, 212, 0.25);
      animation: floatUp linear infinite;
      pointer-events: none;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) scale(1); opacity: 0.6; }
      50%  { opacity: 0.3; }
      100% { transform: translateY(-110vh) scale(0.6); opacity: 0; }
    }

    /* 主容器 */
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      z-index: 10;
      padding: 24px 20px;
      text-align: center;
      animation: fadeIn 1.2s ease both;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* 標題區 */
    .title-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .label {
      font-size: 13px;
      font-weight: 400;
      color: #7dd3fc;
      letter-spacing: 4px;
      text-transform: none;
    }
    h1 {
      font-size: clamp(32px, 7vw, 56px);
      font-weight: 900;
      color: #fde68a;
      letter-spacing: 8px;
      line-height: 1.1;
      text-shadow: 0 0 40px rgba(253, 230, 138, 0.35);
    }
    .subtitle {
      font-size: clamp(14px, 2.5vw, 18px);
      font-weight: 400;
      color: #bae6fd;
      letter-spacing: 3px;
      margin-top: 4px;
    }

    /* 圖片點擊區 */
    .hero-link {
      display: block;
      width: min(680px, 92vw);
      cursor: pointer;
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      border: 2px solid rgba(94, 234, 212, 0.2);
      transition: border-color 0.3s, transform 0.3s;
      box-shadow: 0 0 40px rgba(14, 107, 138, 0.4);
      text-decoration: none;
      animation: fadeIn 1.4s ease both;
    }
    .hero-link:hover {
      border-color: rgba(94, 234, 212, 0.7);
      transform: translateY(-4px) scale(1.01);
      box-shadow: 0 8px 60px rgba(14, 107, 138, 0.7);
    }
    .hero-link svg {
      display: block;
      width: 100%;
    }

    /* 點擊提示 overlay */
    .click-hint {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 16px;
      background: linear-gradient(transparent, rgba(2, 13, 26, 0.85));
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 700;
      color: #fde68a;
      letter-spacing: 2px;
      transition: opacity 0.3s;
    }
    .hero-link:hover .click-hint {
      opacity: 0.85;
    }
    .pulse-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #5eead4;
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50%       { transform: scale(1.6); opacity: 0.5; }
    }

    /* 進度提示 */
    .unit-chips {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      max-width: 620px;
      animation: fadeIn 1.6s ease both;
    }
    .chip {
      font-size: 11px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 20px;
      letter-spacing: 1px;
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.65);
      background: rgba(255,255,255,0.05);
    }

    /* 底部小字 */
    .footer-note {
      font-size: 11px;
      color: rgba(186, 230, 253, 0.35);
      letter-spacing: 2px;
      animation: fadeIn 1.8s ease both;
    }
  </style>
</head>
<body>

  <!-- 浮動泡泡 -->
  <script>
    for (let i = 0; i < 18; i++) {
      const b = document.createElement('div');
      b.className = 'bubble';
      const size = 4 + Math.random() * 14;
      b.style.cssText = `
        width:${size}px; height:${size}px;
        left:${Math.random()*100}vw;
        bottom:${-10 - Math.random()*20}vh;
        animation-duration:${8 + Math.random()*14}s;
        animation-delay:${Math.random()*12}s;
      `;
      document.body.appendChild(b);

  <div class="container">

    <!-- 標題 -->

    <!-- 主視覺圖片（點擊進入課程） -->

        <g transform="translate(340,350)">
          <path d="M0,-45 L10,-15 L40,-28 L20,-5 L45,15 L15,10 L10,42 L0,15 L-10,42 L-15,10 L-45,15 L-20,-5 L-40,-28 L-10,-15 Z" fill="#fb923c" opacity="0.95"/>

        </g>

        <!-- 螃蟹 -->
        <g transform="translate(160,375)">
          <ellipse cx="0" cy="0" rx="32" ry="22" fill="#dc2626" opacity="0.95"/>

</html>
