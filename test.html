<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>總結性評量｜無脊椎動物分類偵探隊</title>
  <style>
    :root {
      --bg: #eef8fb;
      --primary: #1296a3;
      --primary-dark: #0b6d78;
      --accent: #ffb84d;
      --ink: #143f46;
      --muted: #577078;
      --line: #d8e9ee;
      --correct-bg: #e8f8ee;

      --radius: 24px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
      color: var(--ink);

        radial-gradient(circle at 12% 8%, rgba(255, 184, 77, 0.25), transparent 28rem),
        radial-gradient(circle at 90% 10%, rgba(18, 150, 163, 0.20), transparent 30rem),
        var(--bg);
      min-height: 100vh;
    }
    .wrap { width: min(1120px, 92vw); margin: 0 auto; padding: 28px 0 46px; }
    header, section {
      background: rgba(255, 255, 255, 0.92);
      border: 2px solid rgba(255,255,255,.85);
      border-radius: 30px;
      box-shadow: var(--shadow);
    }
    header { padding: clamp(24px, 4vw, 42px); display: grid; grid-template-columns: 1fr auto; gap: 22px; align-items: center; }
    .eyebrow { display: inline-flex; align-items: center; gap: 8px; padding: 8px 14px; border-radius: 999px; background: #e8f8fa; color: var(--primary-dark); font-weight: 900; margin-bottom: 14px; }
    h1 { margin: 0; font-size: clamp(2rem, 5vw, 4rem); line-height: 1.12; color: #103f46; }
    .lead { margin: 16px 0 0; color: var(--muted); font-size: clamp(1.05rem, 2vw, 1.25rem); font-weight: 700; line-height: 1.8; max-width: 820px; }
    .hero-icon { width: 150px; height: 150px; border-radius: 42px; background: linear-gradient(145deg, #e8fbfd, #fff6df); display: grid; place-items: center; font-size: 4.8rem; box-shadow: inset 0 0 0 10px rgba(255,255,255,.55), 0 10px 24px rgba(9, 75, 86, 0.12); }
    section { margin-top: 22px; padding: clamp(20px, 3vw, 32px); border-radius: var(--radius); }
    .student-box { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-top: 20px; }
    .field { display: grid; gap: 8px; }
    label { font-weight: 900; color: #103f46; }
    input[type="text"] { width: 100%; border: 2px solid #cfe3e8; border-radius: 16px; padding: 13px 14px; font-size: 1rem; font-weight: 800; color: var(--ink); background: white; }
    input[type="text"]:focus { outline: 3px solid rgba(18,150,163,.18); border-color: var(--primary); }
    .notice { margin-top: 18px; border-radius: 18px; background: #fff8e8; border: 1px solid #ffd992; color: #75500c; padding: 14px 16px; line-height: 1.7; font-weight: 850; text-align: center; }
    .section-title { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .badge { width: 42px; height: 42px; border-radius: 14px; background: var(--primary); color: white; display: grid; place-items: center; font-weight: 900; flex: 0 0 auto; }
    h2 { margin: 0; font-size: clamp(1.35rem, 3vw, 2rem); color: #103f46; }
    .progress { margin: 12px 0 18px; color: var(--primary-dark); font-weight: 900; }
    .question-card { border: 2px solid var(--line); background: #fbfeff; border-radius: 22px; padding: 20px; margin-top: 16px; }
    .question-card.correct { border-color: var(--correct-border); background: var(--correct-bg); }
    .question-card.incorrect { border-color: var(--incorrect-border); background: var(--incorrect-bg); }
    .q-head { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
    .q-num { flex: 0 0 auto; width: 38px; height: 38px; border-radius: 14px; background: #e8f8fa; color: var(--primary-dark); display: grid; place-items: center; font-weight: 900; }
    .q-title { margin: 0; font-size: 1.12rem; line-height: 1.65; color: #103f46; font-weight: 900; }
    .options { display: grid; gap: 10px; }
    .option { border: 2px solid var(--line); border-radius: 16px; background: #fff; padding: 13px 14px; display: grid; grid-template-columns: auto 1fr; gap: 10px; align-items: start; cursor: pointer; transition: transform .15s ease, border-color .15s ease, background .15s ease; font-weight: 800; line-height: 1.55; }
    .option:hover { transform: translateY(-2px); border-color: #8edce4; background: #f1fbfc; }
    .option.selected { border-color: var(--primary); background: #e9f9fb; }
    .option.correct-choice { border-color: var(--correct-border); background: #dff5e8; }
    .option.wrong-choice { border-color: var(--incorrect-border); background: #ffe1e1; }
    .option input { margin-top: 5px; accent-color: var(--primary); }
    .explain { display: none; margin-top: 14px; border-radius: 16px; padding: 13px 15px; line-height: 1.75; font-weight: 800; }
    .explain.show { display: block; }
    .explain.good { background: #dff5e8; color: #146c3b; border: 1px solid #95d8b1; }
    .explain.bad { background: #ffe1e1; color: #a13b3b; border: 1px solid #efaaa9; }
    .submit-area { display: grid; place-items: center; gap: 12px; margin-top: 24px; }
    .btn { border: 0; border-radius: 18px; padding: 15px 24px; font-size: 1.08rem; font-weight: 900; cursor: pointer; transition: transform .15s ease, opacity .15s ease; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
    .btn:hover:not(:disabled) { transform: translateY(-2px); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .submit-btn { background: var(--primary); color: white; min-width: 210px; }
    .status { font-weight: 900; color: var(--muted); text-align: center; line-height: 1.7; }
    .score-box { display: none; margin-top: 20px; text-align: center; border-radius: 24px; padding: 24px; border: 2px solid #bde7ec; background: linear-gradient(180deg, #f8feff, #e9f9fb); }
    .score-box.show { display: block; }
    .score-big { font-size: clamp(2.4rem, 7vw, 5rem); font-weight: 1000; color: var(--primary-dark); line-height: 1; margin: 8px 0; }
    .score-text { color: var(--muted); font-weight: 850; font-size: 1.08rem; line-height: 1.7; }
    .back-nav { display: flex; justify-content: space-between; gap: 12px; margin-top: 24px; }
    .back-nav a { text-decoration: none; border-radius: 18px; padding: 14px 18px; font-weight: 900; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
    .prev { background: #ffffff; color: var(--primary-dark); border: 2px solid #bde7ec; }
    .home { background: #fff0cf; color: #7b4b00; border: 2px solid #ffd184; }
    @media (max-width: 860px) { header { grid-template-columns: 1fr; text-align: center; } .hero-icon { margin: 0 auto; } .student-box { grid-template-columns: 1fr; } }
    @media (max-width: 620px) { .wrap { width: 94vw; padding-top: 16px; } header, section { border-radius: 22px; } .back-nav { flex-direction: column; } .back-nav a { width: 100%; } }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <div class="eyebrow">📝 總結性評量</div>
        <h1>無脊椎動物分類偵探隊</h1>
        <p class="lead">請閱讀生活情境與觀察線索，運用身體構造、代表動物與分類概念，完成 20 題素養導向選擇題。</p>
        <div class="student-box" aria-label="學生基本資料">
          <div class="field"><label for="className">班級</label><input id="className" type="text" placeholder="例如：三年甲班" autocomplete="off" required /></div>
          <div class="field"><label for="seatNo">座號</label><input id="seatNo" type="text" placeholder="例如：08" inputmode="numeric" autocomplete="off" required /></div>
          <div class="field"><label for="studentName">姓名</label><input id="studentName" type="text" placeholder="請輸入姓名" autocomplete="off" required /></div>
        </div>
        <div class="notice">請確認三個基本資料欄位都已填寫，並完成全部題目後，才能提交答案。</div>
      </div>
      <div class="hero-icon" aria-hidden="true">🧭</div>
    </header>

    <section>
      <div class="section-title"><div class="badge">測</div><h2>評量題目</h2></div>
      <div class="progress" id="progressText">已完成 0 / 20 題</div>
      <div id="quizArea"></div>
      <div class="submit-area">
        <button class="btn submit-btn" id="submitBtn" disabled>提交答案</button>
        <div class="status" id="submitStatus">完成基本資料與 20 題後即可提交。</div>
      </div>
      <div class="score-box" id="scoreBox" aria-live="polite"></div>
    </section>

    <nav class="back-nav" aria-label="頁面導覽">
      <a class="prev" href="review.html">← 回總複習</a>
      <a class="home" href="challenge.html">進階挑戰 →</a>
    </nav>
  </div>

  <script>
    // 重要：部署 Google Apps Script 網頁應用程式後，將網址貼在這裡。
    const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyWjyD_lAIGqW62jSY2XE9bkEeLXaZFimbKMveusMB1z9vzcpub9hR1SNrdbMPez4-rwA/exec';

    const questions = [
      {
        q: '戶外課時，小安在潮間帶看到一種動物，牠身體像星星，表面粗粗有小棘，會慢慢移動。依這些線索，最可能屬於哪一類？',
        options: ['刺絲胞動物門', '軟體動物門', '棘皮動物門', '環節動物門'], answer: 2,
        exp: '海星生活在海中，身體表面有棘，並利用管足移動，符合棘皮動物門的特徵。'
      },
      {
        q: '老師請同學先判斷一隻未知動物是不是無脊椎動物。第一個最適合觀察或確認的重點是什麼？',
        options: ['是否具有外骨骼', '有沒有脊椎骨', '身體是否具有分節', '是否具有特殊運動構造'], answer: 1,
        exp: '無脊椎動物的共同特徵是沒有脊椎骨，因此分類時可先確認有沒有脊椎骨。'
      },
      {
        q: '小組在池塘邊觀察到水螅。牠有觸手，能利用特殊細胞捕捉小生物。這個「特殊細胞」最可能是什麼？',
        options: ['刺絲胞', '管足', '外骨骼', '環狀分節'], answer: 0,
        exp: '水螅屬於刺絲胞動物，牠們的觸手與身體具有刺絲胞，可用於捕食與防禦。'
      },
      {
        q: '一位同學說：「蝸牛和昆蟲都有硬硬的外部構造，所以一定同類。」哪個回應最合理？',
        options: ['正確，只要有硬殼或外骨骼就同類', '不一定，還要看身體是否分節、附肢構造等特徵', '正確，牠們都生活在陸地上', '不正確，因為蝸牛有脊椎骨'], answer: 1,
        exp: '蝸牛屬軟體動物，身體柔軟不分節；昆蟲屬節肢動物，身體分節且有外骨骼與分節附肢。不能只看外表硬不硬。'
      },
      {
        q: '菜園裡的蚯蚓身體細長柔軟，身上有一圈一圈的構造。這些線索指向哪一個動物門？',
        options: ['環節動物門', '扁形動物門', '棘皮動物門', '刺絲胞動物門'], answer: 0,
        exp: '蚯蚓身體具有明顯環狀分節，是環節動物門的代表。'
      },
      {
        q: '小美看到渦蟲的身體扁扁的，像被上下壓平。這種「腹背扁平」的特徵最能協助判斷牠屬於哪一類？',
        options: ['扁形動物門', '節肢動物門', '軟體動物門', '棘皮動物門'], answer: 0,
        exp: '扁形動物的重要線索是身體腹背扁平，例如渦蟲。'
      },
      {
        q: '如果要把「螃蟹、蝴蝶、蜘蛛」分成同一大類，最主要的共同依據是什麼？',
        options: ['都有刺絲胞', '都有外骨骼與分節附肢', '都用管足移動', '身體都腹背扁平'], answer: 1,
        exp: '螃蟹、蝴蝶、蜘蛛都屬節肢動物，具有外骨骼與分節附肢。'
      },
      {
        q: '水族箱中的水母和海星都住在海中。若要判斷牠們是否同一門，還需要比較什麼？',
        options: ['牠們是否都具有外骨骼', '牠們的身體構造與運動方式', '牠們是否都具有環狀分節', '牠們是否都使用相同方式捕食'], answer: 1,
        exp: '生活環境相同不代表分類相同。水母有刺絲胞，海星有棘與管足，應比較構造與運動方式。'
      },
      {
        q: '市場裡有章魚、蛤蜊和蝸牛。雖然外形差很多，但牠們可歸為軟體動物，主要因為牠們通常具有哪項共同特徵？',
        options: ['身體柔軟、不分節', '都有三對腳', '都有刺絲胞', '身體表面一定有棘'], answer: 0,
        exp: '軟體動物的身體柔軟、不分節，許多種類有肌肉構成的足，有些有外殼。'
      },
      {
        q: '小組要設計一張「科學分類觀察表」。下列哪一項最不適合放進觀察表？',
        options: ['是否有脊椎骨', '身體是否分節', '是否有外骨骼或管足', '個體出現地點的臨時標籤'], answer: 3,
        exp: '科學分類應依可觀察、可比較的身體構造與特徵，臨時標籤不是穩定的分類依據。'
      },
      {
        q: '某動物有外骨骼，長大時需要蛻皮。根據課程內容，這個線索最可能指向哪類動物？',
        options: ['節肢動物門', '扁形動物門', '刺絲胞動物門', '環節動物門'], answer: 0,
        exp: '節肢動物具有外骨骼，身體成長時常需要蛻皮，例如昆蟲、蜘蛛、蝦蟹等。'
      },
      {
        q: '有位同學把海星歸到魚類，理由是「牠住在海裡」。你會如何判斷這個分類？',
        options: ['正確，只要住海裡就是魚類', '不正確，海星沒有魚類的脊椎特徵，且具有棘與管足', '正確，海星名字中有星所以是魚', '不正確，因為海星一定住在土裡'], answer: 1,
        exp: '海星是無脊椎動物中的棘皮動物，不是魚類；分類需依身體構造，不只依生活環境。'
      },
      {
        q: '觀察一隻未知小動物時，發現牠有三對腳、身體分成幾段，外面有硬硬的外骨骼。牠最可能是什麼？',
        options: ['昆蟲，屬於節肢動物', '水母，屬於刺絲胞動物', '蚯蚓，屬於環節動物', '渦蟲，屬於扁形動物'], answer: 0,
        exp: '三對腳是昆蟲常見特徵；昆蟲屬於節肢動物，身體分節且有外骨骼與分節附肢。'
      },
      {
        q: '下列哪一組「代表動物—分類」配對最正確？',
        options: ['水母—棘皮動物門', '渦蟲—扁形動物門', '蝸牛—環節動物門', '蚯蚓—刺絲胞動物門'], answer: 1,
        exp: '渦蟲身體腹背扁平，屬於扁形動物門。水母屬刺絲胞，蝸牛屬軟體，蚯蚓屬環節。'
      },
      {
        q: '兩種動物都沒有脊椎骨。甲有觸手與刺絲胞，乙有外骨骼和分節附肢。下列推論何者正確？',
        options: ['甲和乙一定同門，因為都沒有脊椎骨', '甲較可能是刺絲胞動物，乙較可能是節肢動物', '甲是棘皮動物，乙是扁形動物', '乙一定是軟體動物，因為外面硬硬的'], answer: 1,
        exp: '無脊椎只是第一層判斷，還要依構造再分類；刺絲胞指向刺絲胞動物，外骨骼與分節附肢指向節肢動物。'
      },
      {
        q: '小宏想用「是否有腳」來分類所有無脊椎動物。這個方法有什麼問題？',
        options: ['完全正確，所有無脊椎動物都有腳', '不夠完整，因為有些無脊椎動物沒有腳，還需比較其他構造', '完全錯誤，任何動物都不能看構造', '只適合分類魚類'], answer: 1,
        exp: '無脊椎動物差異很大，有些有附肢，有些用管足，有些有觸手或柔軟身體，需綜合多種構造線索。'
      },
      {
        q: '在海邊看到一種動物，牠身體柔軟不分節，受驚時會快速縮回殼內。根據線索，最可能是？',
        options: ['螃蟹，節肢動物', '寄居蟹，節肢動物', '蛤蜊或螺類，軟體動物', '海星，棘皮動物'], answer: 2,
        exp: '身體柔軟不分節且可能有外殼，是軟體動物常見特徵，例如蛤蜊或螺類。'
      },
      {
        q: '老師拿出四張特徵卡：A 刺絲胞、B 腹背扁平、C 環狀分節、D 管足。若要找出海星，應選哪一張？',
        options: ['A 刺絲胞', 'B 腹背扁平', 'C 環狀分節', 'D 管足'], answer: 3,
        exp: '海星屬於棘皮動物，身體有棘，並利用管足移動，所以應選 D。'
      },
      {
        q: '某同學說：「所有無脊椎動物都比脊椎動物簡單，所以不用分門。」哪一個反駁最有證據？',
        options: ['只要沒有脊椎骨，就代表身體構造完全相同', '無脊椎動物有刺絲胞、扁平身體、外骨骼、管足等不同構造，所以仍可再分類', '只要個體體型較小，就不需要進一步分類', '只要能自主移動，就應放入同一個動物門'], answer: 1,
        exp: '好的反駁要提出證據。無脊椎動物內部構造差異大，因此需要依特徵分成不同類群。'
      },
      {
        q: '完成分類任務時，下列哪一個流程最符合科學思考？',
        options: ['先依生活環境分組，再直接決定動物門', '先觀察有沒有脊椎骨，再比較身體構造，最後判斷動物門', '先依動物體型大小排序，再找資料補充', '只看動物住在哪裡就完成分類'], answer: 1,
        exp: '科學分類流程應先確認有沒有脊椎骨，再依身體構造與特徵判斷所屬動物門。'
      }
    ];

    const letters = ['A', 'B', 'C', 'D'];
    const answers = new Array(questions.length).fill(null);
    let submitted = false;

    const quizArea = document.getElementById('quizArea');
    const progressText = document.getElementById('progressText');
    const submitBtn = document.getElementById('submitBtn');
    const submitStatus = document.getElementById('submitStatus');
    const scoreBox = document.getElementById('scoreBox');
    const className = document.getElementById('className');
    const seatNo = document.getElementById('seatNo');
    const studentName = document.getElementById('studentName');

    function renderQuestions() {
      questions.forEach((item, index) => {
        const card = document.createElement('article');
        card.className = 'question-card';
        card.id = `q${index + 1}`;
        card.innerHTML = `
          <div class="q-head">
            <div class="q-num">${index + 1}</div>
            <h3 class="q-title">${item.q}</h3>
          </div>
          <div class="options" role="radiogroup" aria-label="第 ${index + 1} 題選項">
            ${item.options.map((opt, optionIndex) => `
              <label class="option" data-question="${index}" data-option="${optionIndex}">
                <input type="radio" name="q${index}" value="${optionIndex}" />
                <span><strong>${letters[optionIndex]}.</strong> ${opt}</span>
              </label>
            `).join('')}
          </div>
          <div class="explain"></div>
        `;
        quizArea.appendChild(card);
      });

      document.querySelectorAll('.option').forEach(label => {
        label.addEventListener('click', () => {
          if (submitted) return;
          const qIndex = Number(label.dataset.question);
          const optionIndex = Number(label.dataset.option);
          answers[qIndex] = optionIndex;
          document.querySelectorAll(`.option[data-question="${qIndex}"]`).forEach(item => item.classList.remove('selected'));
          label.classList.add('selected');
          label.querySelector('input').checked = true;
          updateProgress();
        });
      });
    }

    function basicInfoComplete() {
      return className.value.trim() && seatNo.value.trim() && studentName.value.trim();
    }

    function updateProgress() {
      const done = answers.filter(value => value !== null).length;
      progressText.textContent = `已完成 ${done} / ${questions.length} 題`;
      const ready = basicInfoComplete() && done === questions.length && !submitted;
      submitBtn.disabled = !ready;
      submitStatus.textContent = ready ? '已完成全部題目，可以提交答案。' : '完成基本資料與 20 題後即可提交。';
    }

    [className, seatNo, studentName].forEach(input => input.addEventListener('input', updateProgress));

    async function submitAnswers() {
      if (submitted || submitBtn.disabled) return;
      submitted = true;
      submitBtn.disabled = true;
      submitBtn.textContent = '已提交';
      submitStatus.textContent = '答案已提交，正在呈現分數與詳解。';

      let correctCount = 0;
      questions.forEach((item, index) => {
        const card = document.getElementById(`q${index + 1}`);
        const chosen = answers[index];
        const correct = chosen === item.answer;
        if (correct) correctCount++;
        card.classList.add(correct ? 'correct' : 'incorrect');
        card.querySelectorAll('.option').forEach(option => {
          const optionIndex = Number(option.dataset.option);
          option.querySelector('input').disabled = true;
          if (optionIndex === item.answer) option.classList.add('correct-choice');
          if (optionIndex === chosen && !correct) option.classList.add('wrong-choice');
        });
        const explain = card.querySelector('.explain');
        explain.className = `explain show ${correct ? 'good' : 'bad'}`;
        explain.innerHTML = `<strong>${correct ? '答對了' : '答錯了'}。</strong> 正確答案：${letters[item.answer]}。你的答案：${letters[chosen]}。<br>${item.exp}`;
      });

      const score = Math.round((correctCount / questions.length) * 100);
      scoreBox.classList.add('show');
      scoreBox.innerHTML = `
        <div class="score-text">${studentName.value.trim()}，你的總結性評量結果</div>
        <div class="score-big">${score} 分</div>
        <div class="score-text">答對 ${correctCount} / ${questions.length} 題。下方已顯示每題正確答案與詳解。</div>
      `;
      scoreBox.scrollIntoView({ behavior: 'smooth', block: 'center' });

      const payload = {
        timestamp: new Date().toISOString(),
        className: className.value.trim(),
        seatNo: seatNo.value.trim(),
        studentName: studentName.value.trim(),
        score,
        correctCount,
        total: questions.length,
        answers: questions.map((item, index) => ({
          questionNumber: index + 1,
          question: item.q,
          selectedLetter: letters[answers[index]],
          selectedText: item.options[answers[index]],
          correctLetter: letters[item.answer],
          correctText: item.options[item.answer],
          isCorrect: answers[index] === item.answer
        }))
      };

      if (!GAS_WEB_APP_URL || GAS_WEB_APP_URL.includes('請貼上')) {
        submitStatus.textContent = '尚未設定 Apps Script Web App URL；本頁已完成計分，但不會上傳到試算表。';
        return;
      }

      try {
        await fetch(GAS_WEB_APP_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload)
        });
        submitStatus.textContent = '答案已提交，資料已送往雲端試算表。';
      } catch (error) {
        console.error(error);
        submitStatus.textContent = '本頁已完成計分，但資料送出時發生錯誤。請通知老師。';
      }
    }

    submitBtn.addEventListener('click', submitAnswers);
    renderQuestions();
    updateProgress();
  </script>
</body>
</html>
